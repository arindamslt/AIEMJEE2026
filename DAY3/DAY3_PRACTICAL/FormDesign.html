<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>FORM DESIGN</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body>
<div style="width: 30%;margin:50px auto;">
	<h3 class="text-primary">EMPLOYEE REGISTRATION FORM</h3>
	<form action="Show.html" method="post">
		<input type="text" class="form-control" name="ename" placeholder="ENTER YOUR NAME"/>
		<input type="text" class="form-control" name="phno" placeholder="ENTER THE PHONE NUMBER"/>
		<input type="text" class="form-control" name="dept" placeholder="ENTER YOUR DEPARTMENT"/>
		<input type="submit" class="btn btn-outline-primary" value="REGISTER"/>
	</form>
</div>
</body>
</html>
