<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>JAVASCRIPT FUNCTION</title>
<script>
	//CONCRETE FUNCTION
	function fn1()
	{
		document.write("NORMAL FUNCTION");
		document.write("<br/>");
	}
	fn1();//CALLING A FUNCTION
	//PARAMETERISED FUNCTION
	function fn2(x,y)
	{
		document.write(x,y);
		document.write("<br/>");
	}
	fn2(10,20);
	//FUNCTION WITH RETURN STATEMENT
	function fn3(a,b)
	{
		return(a+b);
	}
	var res=fn3(20,40);
	document.write(res);
    document.write("<br/>");
    //ANNONYMOUS FUNCTION.FUNCTION WITHOUT NAME
    function fn4(f)
    {
		f();
	}
	fn4(function(){
		var city='KOLKATA';
		document.write(city);
		 document.write("<br/>");
	})
	//HIGER ORDER AND CALLBACK BACK FUNCTION
function print()
{
	document.write("CALLBACK FUNCTION");
}
//HERE fn5 is called higer order function and print is called callback function
function fn5(f)
    {
		f();
	}
	fn5(print);
</script>
</head>
<body>

</body>
</html>
