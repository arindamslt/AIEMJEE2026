<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>EMPLOYEE FORM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body>
<div style="width:30%;margin:50px auto;">
	<h3 class="text-primary">EMPLOYEE REGISTRATION FORM</h3>
	<form action="EmployeeServe" >
		<input type="text" name="eid" class="form-control" placeholder="ENTER THE EMPLOYEE ID"/>
		<input type="text" name="ename" class="form-control" placeholder="ENTER YOUR NAME"/>
		 DESIGNATION:<select class="form-control" name="desig">
			 <option value="">CHOOSE DESIGNATION</option>
			<option value="MANAGER">MANAGER</option>
			<option value="ANALYST">ANALYST</option>
			<option value="CLERK">CLERK</option>
			<option value="EXECUTIVE">EXECUTIVE</option>
		</select>
			
		 DEPARTMENT:<select class="form-control" name="dept">
			 <option value="">CHOOSE DEPARTMENT</option>
			<option value="IT">IT</option>
			<option value="HR">HR</option>
			<option value="FINANCE">FINANCE</option>
			<option value="MARKETING">MARKETING</option>
		</select>
		<input type="submit" class="btn btn-outline-primary" value="ADD"/>
	</form>
</div>
</body>
</html>
