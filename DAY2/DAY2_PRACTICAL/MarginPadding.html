<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>MARGIN PADDING</title>
<style>
	#root{
		border:10px solid red;
	}
	#child1{
		border:10px solid blue;
		margin:5px 10px;
		padding:10px 2px 3px 8px;
	}
	#child2{
		border: 10px solid black;
		margin:10px 5px 15px 2px;
		padding:10px;
	}
</style>
</head>
<body>
<div id="root">
	<h2>ROOT DIV</h2>
	<div id="child1">
		<h2>CHILD1 DIV</h2>
	</div>
	<div id="child2">
		<h2>CHILD2 DIV</h2>
	</div>
</div>
</body>
</html>
